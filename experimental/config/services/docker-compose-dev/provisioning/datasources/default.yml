apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    isDefault: true
    url: http://host.docker.internal:9090
    editable: true
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    isDefault: false
    url: http://host.docker.internal:3200
    editable: true
